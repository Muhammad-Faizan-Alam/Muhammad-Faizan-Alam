name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=Muhammad-Faizan-Alam&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true"
          path: stats-card.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=Muhammad-Faizan-Alam&layout=compact&theme=tokyonight&hide_border=true&langs_count=8"
          path: langs-card.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats-card.svg langs-card.svg
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update stats SVGs [skip ci]"
          git push
